basePath: /
definitions:
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthContextResponse:
    properties:
      client_id:
        type: string
      scope:
        type: string
      user_id:
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthDecisionRequest:
    properties:
      authorize:
        type: boolean
      deny:
        type: boolean
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthDecisionResponse:
    properties:
      redirect:
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse:
    properties:
      error:
        example: invalid_request
        type: string
      error_description:
        example: The request is missing a required parameter.
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginResponse:
    properties:
      redirect:
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginStatusResponse:
    properties:
      logged_in:
        type: boolean
      redirect:
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.OIDCDiscovery:
    properties:
      authorization_endpoint:
        type: string
      claims_supported:
        items:
          type: string
        type: array
      code_challenge_methods_supported:
        items:
          type: string
        type: array
      grant_types_supported:
        items:
          type: string
        type: array
      id_token_signing_alg_values_supported:
        items:
          type: string
        type: array
      issuer:
        type: string
      jwks_uri:
        type: string
      registration_endpoint:
        type: string
      response_types_supported:
        items:
          type: string
        type: array
      scopes_supported:
        items:
          type: string
        type: array
      subject_types_supported:
        items:
          type: string
        type: array
      token_endpoint:
        type: string
      token_endpoint_auth_methods_supported:
        items:
          type: string
        type: array
      userinfo_endpoint:
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJSUzI1NiIs...
        type: string
      expires_in:
        example: 7200
        type: integer
      id_token:
        example: eyJhbGciOiJSUzI1NiIs...
        type: string
      refresh_token:
        example: ODk4YWY2Njkt...
        type: string
      scope:
        example: openid profile
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.UserInfoResponse:
    properties:
      email:
        example: admin@example.com
        type: string
      email_verified:
        example: true
        type: boolean
      name:
        example: Admin User
        type: string
      sub:
        example: "1"
        type: string
    type: object
host: localhost:9096
info:
  contact: {}
  description: |-
    Go implementation of OAuth 2.0 Authorization Server and OpenID Connect 1.0 Provider.
    Supports authorization code (with PKCE), password, client_credentials, and refresh_token grants per OAuth 2.1.
    Implicit and hybrid flows are removed per OAuth 2.1 security recommendations.
    Issues JWT access tokens and ID tokens signed with RS256. Provides JWKS and OIDC Discovery endpoints.
  title: OAuth 2.0 + OpenID Connect Server
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Returns the server's public RSA key in JWK format used to verify
        JWT signatures (RS256). Cacheable for 3600 seconds.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: JSON Web Key Set
      tags:
      - OIDC
  /.well-known/openid-configuration:
    get:
      description: Returns the OpenID Provider Configuration Information as specified
        in OpenID Connect Discovery 1.0.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.OIDCDiscovery'
      summary: OIDC Discovery Document
      tags:
      - OIDC
  /api/auth:
    get:
      consumes:
      - application/json
      description: |-
        Returns the consent page context for the current authorization request, including the logged-in user ID, client ID, and requested scope. Requires an active user session.
        Submits the user's consent decision (approve or deny) for the current authorization request. On approval, returns the stored ReturnURI (the original /oauth/authorize URL) so the frontend can redirect the browser. On denial, returns a redirect URI with error=access_denied.
      parameters:
      - description: Client identifier from the authorize request
        in: query
        name: client_id
        type: string
      - description: Space-delimited scopes from the authorize request
        in: query
        name: scope
        type: string
      - description: Authorization decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthDecisionRequest'
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthDecisionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: Submit authorization decision
      tags:
      - Auth
      - Auth
    post:
      consumes:
      - application/json
      description: |-
        Returns the consent page context for the current authorization request, including the logged-in user ID, client ID, and requested scope. Requires an active user session.
        Submits the user's consent decision (approve or deny) for the current authorization request. On approval, returns the stored ReturnURI (the original /oauth/authorize URL) so the frontend can redirect the browser. On denial, returns a redirect URI with error=access_denied.
      parameters:
      - description: Client identifier from the authorize request
        in: query
        name: client_id
        type: string
      - description: Space-delimited scopes from the authorize request
        in: query
        name: scope
        type: string
      - description: Authorization decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthDecisionRequest'
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.AuthDecisionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: Submit authorization decision
      tags:
      - Auth
      - Auth
  /api/login:
    get:
      consumes:
      - application/json
      description: |-
        Returns whether the current session has an authenticated user. If logged in, also returns the redirect URI stored in the session.
        Authenticates a user with username and password. Creates a server-side session and returns a redirect URI (either the stored ReturnURI from a prior authorize attempt, or /auth).
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginRequest'
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: Authenticate user
      tags:
      - Auth
      - Auth
    post:
      consumes:
      - application/json
      description: |-
        Returns whether the current session has an authenticated user. If logged in, also returns the redirect URI stored in the session.
        Authenticates a user with username and password. Creates a server-side session and returns a redirect URI (either the stored ReturnURI from a prior authorize attempt, or /auth).
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginRequest'
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.LoginResponse'
        "400":
