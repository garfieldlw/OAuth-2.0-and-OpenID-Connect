          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: OAuth 2.0 Token Endpoint
      tags:
      - OAuth2
  /userinfo:
    get:
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      description: Returns claims about the authenticated end-user. Requires a valid
        Bearer access token with openid scope.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.UserInfoResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: OIDC UserInfo Endpoint
      tags:
      - OIDC
    post:
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      description: Returns claims about the authenticated end-user. Requires a valid
        Bearer access token with openid scope.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
