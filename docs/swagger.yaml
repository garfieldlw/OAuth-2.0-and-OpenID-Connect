          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: Authenticate user
      tags:
      - Auth
      - Auth
  /api/test:
    get:
      description: Validates the Bearer access token from the Authorization header.
        Sets TokenInfo in the Gin context on success.
      parameters:
      - description: Bearer access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token valid, TokenInfo set in context
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: Bearer Token Verification Middleware
      tags:
      - API
  /logout:
    get:
      description: Ends the user session and redirects to the login page or the post_logout_redirect_uri.
      parameters:
      - description: URI to redirect after logout
        in: query
        name: post_logout_redirect_uri
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to login or post_logout_redirect_uri
          schema:
            type: string
      summary: End Session
      tags:
      - OAuth2
  /oauth/authorize:
    get:
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      description: Authenticates the resource owner and issues an authorization code.
        Requires an active user session. Implicit and hybrid flows are removed per
        OAuth 2.1 security recommendations.
      parameters:
      - description: Response type
        enum:
        - code
        in: query
        name: response_type
        required: true
        type: string
      - description: Client identifier
        in: query
        name: client_id
        required: true
        type: string
      - description: Redirect URI registered for the client
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Space-delimited scopes (e.g. openid profile email)
        in: query
        name: scope
        type: string
      - description: Opaque value returned to the client
        in: query
        name: state
        type: string
      - description: Nonce for ID token replay protection (recommended when scope
          includes openid)
        in: query
        name: nonce
        type: string
      - description: PKCE code challenge
        in: query
        name: code_challenge
        type: string
      - description: PKCE method
        enum:
        - S256
        in: query
        name: code_challenge_method
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to redirect_uri with authorization code in query
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: OAuth 2.0 / OIDC Authorization Endpoint
      tags:
      - OAuth2
    post:
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      description: Authenticates the resource owner and issues an authorization code.
        Requires an active user session. Implicit and hybrid flows are removed per
        OAuth 2.1 security recommendations.
      parameters:
      - description: Response type
        enum:
        - code
        in: query
        name: response_type
        required: true
        type: string
      - description: Client identifier
        in: query
        name: client_id
        required: true
        type: string
      - description: Redirect URI registered for the client
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: Space-delimited scopes (e.g. openid profile email)
        in: query
        name: scope
        type: string
      - description: Opaque value returned to the client
        in: query
        name: state
        type: string
      - description: Nonce for ID token replay protection (recommended when scope
          includes openid)
        in: query
        name: nonce
        type: string
      - description: PKCE code challenge
        in: query
        name: code_challenge
        type: string
      - description: PKCE method
        enum:
        - S256
        in: query
        name: code_challenge_method
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to redirect_uri with authorization code in query
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: OAuth 2.0 / OIDC Authorization Endpoint
      tags:
      - OAuth2
  /oauth/token:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Issues tokens based on the grant type. Supports authorization_code,
        password, client_credentials, and refresh_token grants. Returns id_token when
        scope includes openid and a user context exists.
      parameters:
      - description: Grant type
        enum:
        - authorization_code
        - password
        - client_credentials
        - refresh_token
        in: formData
        name: grant_type
        required: true
        type: string
      - description: Client identifier (required if not using Authorization header)
        in: formData
        name: client_id
        type: string
      - description: Client secret
        in: formData
        name: client_secret
        type: string
      - description: Authorization code (authorization_code grant)
        in: formData
        name: code
        type: string
      - description: Redirect URI (authorization_code grant)
        in: formData
        name: redirect_uri
        type: string
      - description: Space-delimited scopes
        in: formData
        name: scope
        type: string
      - description: Username (password grant)
        in: formData
        name: username
        type: string
      - description: Password (password grant)
        in: formData
        name: password
        type: string
      - description: Refresh token (refresh_token grant)
        in: formData
        name: refresh_token
        type: string
      - description: PKCE code verifier
        in: formData
        name: code_verifier
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_garfieldlw_OAuth-2_0-and-OpenID-Connect_internal_model.ErrorResponse'
      summary: OAuth 2.0 Token Endpoint
      tags:
      - OAuth2
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Issues tokens based on the grant type. Supports authorization_code,
        password, client_credentials, and refresh_token grants. Returns id_token when
        scope includes openid and a user context exists.
      parameters:
      - description: Grant type
        enum:
